deploymentEnv: production
otel:
  enabled: true

chain: mainnet
hostNames:
  - console-api-mainnet.akash.network
  - console-api.akash.network
  - api.akash.network
jobs:
  - name: top-up-deployments
    schedule: "0 * * * *" # 0 minutes past the hour
    command:
      - node
      - --require
      - ./dist/instrumentation.js
      - ./dist/console.js
      - top-up-deployments
  - name: refill-wallets
    schedule: "45 * * * *" # 45 minutes past the hour
    command:
      - node
      - --require
      - ./dist/instrumentation.js
      - ./dist/console.js
      - refill-wallets
  - name: cleanup-stale-deployments
    schedule: "30 10,22 * * *" # 10:30 AM and 10:30 PM every day
    command:
      - node
      - --require
      - ./dist/instrumentation.js
      - ./dist/console.js
      - cleanup-stale-deployments
  - name: gpu-pricing-bot
    schedule: "0 12 * * *"
    command:
      - node
      - --require
      - ./dist/instrumentation.js
      - ./dist/console.js
      - gpu-pricing-bot
  - name: mint-act
    schedule: "0 6 * * *" # 6:00 AM every day
    command:
      - node
      - --require
      - ./dist/instrumentation.js
      - ./dist/console.js
      - mint-act

replicas: 3

resources:
  limits:
    cpu: 2
    ephemeral-storage: 2Gi
    memory: 4Gi
  requests:
    cpu: 250m
    ephemeral-storage: 1Gi
    memory: 1Gi
