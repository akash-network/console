deploymentEnv: production
otel:
  enabled: true

chain: mainnet
hostNames:
  - console-api-mainnet.akash.network
  - console-api.akash.network
  - api.akash.network
jobs:
  - name: top-up-deployments
    schedule: "0 * * * *" # 0 minutes past the hour
    command:
      - node
      - --require
      - "dist/instrumentation"
      - dist/console.js
      - top-up-deployments
  - name: refill-wallets
    schedule: "45 * * * *" # 45 minutes past the hour
    command:
      - node
      - --require
      - "dist/instrumentation"
      - dist/console.js
      - refill-wallets
  - name: cleanup-stale-deployments
    schedule: "30 10,22 * * *" # 10:30 AM and 10:30 PM every day
    command:
      - node
      - --require
      - "dist/instrumentation"
      - dist/console.js
      - cleanup-stale-deployments
  - name: gpu-pricing-bot
    schedule: "0 12 * * *"
    command:
      - node
      - --require
      - "dist/instrumentation"
      - dist/console.js
      - gpu-pricing-bot

replicas: 3

resources:
  limits:
    cpu: "4"
    ephemeral-storage: "2Gi"
    memory: "8Gi"
  requests:
    cpu: "1"
    ephemeral-storage: "1Gi"
    memory: "4Gi"
