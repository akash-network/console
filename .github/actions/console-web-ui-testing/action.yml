name: Console Web UI testing
description: Runs UI tests for Console Web

inputs:
  ref:
    description: Git ref related to the tests (e.g., console-web/v1.2.3)
    required: true
  url:
    description: Base URL to Console Web
    required: true
  test-wallet-mnemonic:
    description: Test wallet mnemonic
    required: true
  slack-webhook-url:
    description: Slack webhook URL
    required: false
  gh-user-to-slack-user:
    description: GitHub user to Slack user mapping
    required: false
    default: "{}"
  testing-client-token:
    description: E2E testing client token which allows to bypass captcha verification
    required: true
  auth0-m2m-domain:
    description: Auth0 M2M domain for management API calls
    required: true
  auth0-m2m-client-id:
    description: Auth0 M2M client ID
    required: true
  auth0-m2m-client-secret:
    description: Auth0 M2M client secret
    required: true
  mailsac-api-key:
    description: Mailsac API key for email verification
    required: true
  email-verification-strategy:
    description: Email verification strategy (mailsac-code or auth0-ticket)
    required: false
    default: "mailsac-code"
  test-user-email:
    description: Pre-registered test user email for authenticated tests
    required: false
  test-user-password:
    description: Pre-registered test user password for authenticated tests
    required: false

runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/setup-app-deps
      with:
        app: deploy-web
    - name: Install Playwright Dependencies
      shell: bash
      working-directory: apps/deploy-web
      run: npx playwright install-deps chromium
    - name: Install Playwright Browsers
      shell: bash
      working-directory: apps/deploy-web
      run: npx playwright install --no-shell chromium
    - name: Run e2e tests
      id: e2e-tests
      env:
        TEST_WALLET_MNEMONIC: ${{ inputs.test-wallet-mnemonic }}
        BASE_URL: ${{ inputs.url }}
        E2E_TESTING_CLIENT_TOKEN: ${{ inputs.testing-client-token }}
        AUTH0_M2M_DOMAIN: ${{ inputs.auth0-m2m-domain }}
        AUTH0_M2M_CLIENT_ID: ${{ inputs.auth0-m2m-client-id }}
        AUTH0_M2M_CLIENT_SECRET: ${{ inputs.auth0-m2m-client-secret }}
        MAILSAC_API_KEY: ${{ inputs.mailsac-api-key }}
        EMAIL_VERIFICATION_STRATEGY: ${{ inputs.email-verification-strategy }}
        TEST_USER_EMAIL: ${{ inputs.test-user-email }}
        TEST_USER_PASSWORD: ${{ inputs.test-user-password }}
        USER_DATA_DIR: ${{ runner.temp }}/chrome-profile-${{ github.run_id }}-${{ github.run_attempt }}
        CI: "true"
      shell: bash
      run: npm run test:e2e --workspace=apps/deploy-web
    - name: Tests cleanup
      if: ${{ !cancelled() }}
      shell: bash
      env:
        TEST_WALLET_MNEMONIC: ${{ inputs.test-wallet-mnemonic }}
      run: |
        npx --yes tsx@4.20.6 apps/deploy-web/script/closeDeployments.ts
    - uses: actions/upload-artifact@v4
      id: playwright-report
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: apps/deploy-web/playwright-report/
        retention-days: 5

    - uses: ./.github/actions/slack-tests-failed-notification
      if: ${{ !cancelled() && steps.e2e-tests.outcome == 'failure' }}
      with:
        ref: ${{ inputs.ref }}
        url: ${{ inputs.url }}
        gh-user-to-slack-user: ${{ inputs.gh-user-to-slack-user }}
        slack-webhook-url: ${{ inputs.slack-webhook-url }}
        message-title: "Console web UI tests failed on beta"

    - name: Summarize Test Results
      if: ${{ !cancelled() }}
      shell: bash
      run: |
        echo "### 📝 E2E Test Summary" >> $GITHUB_STEP_SUMMARY
        prefix=":white_check_mark: Passed"
        if [ "${{ steps.e2e-tests.outcome }}" == "failure" ]; then
          prefix=":x: Failed"
        fi
        echo "${prefix}, [download tests report](${{ steps.playwright-report.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY
