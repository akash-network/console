name: Get Associated PR
description: Gets the associated PR for a commit (takes commit from github context or sha input)

inputs:
  ref:
    description: Git ref or commit SHA to look up (defaults to github.sha)
    required: false
    default: ""
  gh-user-to-slack-user:
    description: GitHub user to Slack user mapping
    required: false
    default: "{}"
  display-pr-details:
    description: Whether to display associated PR details in the step summary
    required: false
    default: "false"
  export-file-changes:
    description: |
      Newline-separated list of filenames to check for changes in the PR.
      When provided, populates the `changes` output with the subset of these files
      that were modified in the PR.
    required: false
    default: ""

outputs:
  number:
    description: The number of the associated PR
    value: ${{ steps.associated-pr.outputs.number }}
  title:
    description: The title of the associated PR
    value: ${{ steps.associated-pr.outputs.title }}
  author:
    description: The author of the associated PR
    value: ${{ steps.associated-pr.outputs.author }}
  slack-user:
    description: The Slack user of the author
    value: ${{ steps.associated-pr.outputs.slack-user }}
  head_ref:
    description: The head branch ref of the PR
    value: ${{ steps.associated-pr.outputs.head_ref }}
  head_repo:
    description: The head repository full name of the PR
    value: ${{ steps.associated-pr.outputs.head_repo }}
  labels:
    description: JSON array of PR label names (use `fromJSON(...)` in expressions)
    value: ${{ steps.associated-pr.outputs.labels }}
  closed:
    description: Whether the PR is closed
    value: ${{ steps.associated-pr.outputs.closed }}
  changes:
    description: |
      JSON array of filenames from `export-file-changes` that were modified in the PR.
      Empty array when `export-file-changes` is not provided or no PR was found.
    value: ${{ steps.associated-pr.outputs.changes }}

runs:
  using: "composite"
  steps:
    - name: Get commit SHA
      id: get-sha
      env:
        INPUT_REF: ${{ inputs.ref }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: | # js
          if (!process.env.INPUT_REF) {
            core.info(`No ref input provided, using context.sha: ${context.sha}`);
            core.setOutput('sha', context.sha);
            return;
          }

          // handles console-web/v1.2.3 tags and inputs with typos console-web/vv1.2.3
          if (/^[\w-]+\/v{1,2}[\d.]+(-\w+\.\d+)?$/.test(process.env.INPUT_REF)) {
            core.info(`Ref input looks like app version tag, trying to resolve its sha: ${process.env.INPUT_REF}`);
            const { data } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${process.env.INPUT_REF.replace(/\/v{2,}/, '/v')}`,
            });
            core.setOutput('sha', data.object.sha);
            return;
          }

          core.info(`Using provided ref as sha: ${process.env.INPUT_REF}`);
          core.setOutput('sha', process.env.INPUT_REF);

    - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: associated-pr
      env:
        GH_USER_TO_SLACK_USER: ${{ inputs.gh-user-to-slack-user }}
        INPUT_SHA: ${{ steps.get-sha.outputs.sha }}
        INPUT_EXPORT_FILE_CHANGES: ${{ inputs.export-file-changes }}
      with:
        script: | # js
          const commitSha = process.env.INPUT_SHA || context.sha;
          const filesToTrack = (process.env.INPUT_EXPORT_FILE_CHANGES || '')
            .split('\n')
            .map(s => s.trim())
            .filter(Boolean);
          core.setOutput('changes', '[]');
          core.setOutput('labels', '[]');

          // listPullRequestsAssociatedWithCommit does not index head commits
          // from fork PRs (even though they're reachable via refs/pull/N/head),
          // so for forks we fall back to the search API. We detect fork up
          // front from the event payload to avoid wasting retry budget on the
          // primary API which will never return a result for a fork commit.
          const headRepoFullName = context.payload.workflow_run?.head_repository?.full_name
            || context.payload.pull_request?.head?.repo?.full_name;
          const baseRepoFullName = `${context.repo.owner}/${context.repo.repo}`;
          const isFork = headRepoFullName && headRepoFullName !== baseRepoFullName;

          const findPrViaAssociations = async () => {
            const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              commit_sha: commitSha,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            return data && data.length > 0 ? data[0] : null;
          };

          const findPrViaSearch = async () => {
            const { data } = await github.rest.search.issuesAndPullRequests({
              q: `${commitSha} repo:${baseRepoFullName} type:pr`
            });
            if (!data.items || data.items.length === 0) return null;
            const { data: full } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: data.items[0].number,
            });
            return full;
          };

          const findPr = isFork ? findPrViaSearch : findPrViaAssociations;
          if (isFork) {
            core.info(`Commit is from fork (${headRepoFullName}), using search API to find PR`);
          }

          let pr;
          const maxRetries = 5;
          const baseDelay = 2000;

          // Always fetch from the API rather than reading context.payload.pull_request:
          // the webhook payload is frozen at event-fire time and does not reflect
          // label/metadata changes made afterwards.
          // Retry logic also handles timing issues where the commit-PR association
          // (or search index) isn't immediately available after push or merge.
          for (let attempt = 0; attempt < maxRetries; attempt++) {
            if (attempt > 0) {
              // Exponential backoff: 2s, 4s, 8s, 16s, 32s
              const delay = baseDelay * Math.pow(2, attempt - 1);
              core.info(`PR not found, retrying in ${delay}ms (attempt ${attempt + 1}/${maxRetries})...`);
              await new Promise(resolve => setTimeout(resolve, delay));
            }

            pr = await findPr();
            if (pr) {
              core.info(`Found PR #${pr.number} on attempt ${attempt + 1}`);
              break;
            }
          }

          if (!pr) {
            core.warning(`No PR found for commit ${commitSha} after retries`);
            return;
          }

          if (pr.merged && !pr.merged_by) {
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            pr = data;
          }

          core.setOutput('number', pr.number);
          core.setOutput('title', pr.title);
          core.setOutput('head_ref', pr.head.ref);
          core.setOutput('head_repo', pr.head.repo?.full_name || '');
          core.setOutput('labels', JSON.stringify((pr.labels || []).map(l => l.name)));
          core.setOutput('closed', pr.closed_at ? 'true' : 'false');

          const author = pr.merged_by?.login || pr.user.login;
          core.setOutput('author', author);

          const userMapping = JSON.parse(process.env.GH_USER_TO_SLACK_USER || '{}');
          core.setOutput('slack-user', userMapping[author] || "");

          if (filesToTrack.length > 0) {
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const changedFilenames = new Set(files.map(f => f.filename));
            const changes = filesToTrack.filter(f => changedFilenames.has(f));
            core.setOutput('changes', JSON.stringify(changes));
          }

    - name: Display associated PR details
      if: steps.associated-pr.outputs.number != '' && inputs.display-pr-details == 'true'
      env:
        PR_NUMBER: ${{ steps.associated-pr.outputs.number }}
        PR_TITLE: ${{ steps.associated-pr.outputs.title }}
      shell: bash
      run: | # shell
        pr_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${PR_NUMBER}"
        echo "### Associated PR" >> "$GITHUB_STEP_SUMMARY"
        echo "[#${PR_NUMBER} - ${PR_TITLE}](${pr_url})" >> "$GITHUB_STEP_SUMMARY"
