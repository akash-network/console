name: Deploy Notifications

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., latest, 1.0.0, v1.0.0)"
        required: false
        type: string
      cancel-if-stale:
        description: "Cancel this deployment if a newer version is already queued, running, or recently deployed"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # don't cancel deployments!

jobs:
  setup:
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/reusable-deploy-setup.yml
    with:
      app: notifications
      image_tag: ${{ inputs.image_tag || github.ref_name }}
      cancel-if-stale: ${{ inputs.cancel-if-stale == 'true' }}

  deploy-beta:
    permissions:
      contents: read
      pull-requests: read
      deployments: write
    needs: setup
    if: ${{ !needs.setup.outputs.skip }}
    name: Deploy to beta
    uses: ./.github/workflows/reusable-deploy-k8s.yml
    secrets: inherit
    with:
      app: notifications
      appVersion: ${{ needs.setup.outputs.image_tag }}
      environment: staging

  auto-approve-decision:
    needs: [setup, deploy-beta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      approve: ${{ steps.check.outputs.in-window }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/associated-pr
        id: pr
        continue-on-error: true
        with:
          ref: notifications/v${{ needs.setup.outputs.image_tag }}
      - uses: ./.github/actions/working-hours-check
        id: check
        with:
          actor: ${{ steps.pr.outputs.author }}
          working-hours-config: ${{ vars.WORKING_HOURS_BY_ACTOR }}

  deploy-prod:
    permissions:
      contents: read
      pull-requests: read
      deployments: write
    needs: [setup, deploy-beta, auto-approve-decision]
    name: Deploy to prod
    uses: ./.github/workflows/reusable-deploy-k8s.yml
    secrets: inherit
    with:
      app: notifications
      appVersion: ${{ needs.setup.outputs.image_tag }}
      environment: prod
      approve: ${{ needs.auto-approve-decision.outputs.approve == 'true' }}
