name: Deploy Console Web

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., latest, 1.0.0, v1.0.0)"
        required: false
        type: string
      cancel-if-stale:
        description: "Cancel this deployment if a newer version is already queued, running, or recently deployed"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # don't cancel deployments!

jobs:
  setup:
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/reusable-deploy-setup.yml
    with:
      app: console-web
      image_tag: ${{ inputs.image_tag || github.ref_name }}
      cancel-if-stale: ${{ inputs.cancel-if-stale == 'true' }}

  deploy-beta:
    permissions:
      contents: read
      pull-requests: read
      deployments: write
    needs: setup
    if: ${{ !needs.setup.outputs.skip }}
    name: Deploy to beta
    uses: ./.github/workflows/reusable-deploy-k8s.yml
    secrets: inherit
    with:
      app: console-web
      appVersion: ${{ needs.setup.outputs.image_tag }}
      environment: staging

  test-beta:
    runs-on: [self-hosted, akash]
    needs:
      - setup
      - deploy-beta
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/console-web-ui-testing
        with:
          ref: console-web/v${{ needs.setup.outputs.image_tag }}
          url: ${{ vars.CONSOLE_WEB_BETA_URL }}
          slack-webhook-url: ${{ secrets.FAILED_E2E_TESTS_SLACK_WEBHOOK_URL }}
          test-wallet-mnemonic: ${{ secrets.CONSOLE_WEB_E2E_TEST_WALLET_MNEMONIC }}
          gh-user-to-slack-user: ${{ vars.GH_USER_TO_SLACK_USER }}
          testing-client-token: ${{ secrets.CONSOLE_WEB_E2E_TESTING_CLIENT_TOKEN_BETA }}
          auth0-m2m-domain: ${{ secrets.AUTH0_M2M_DOMAIN }}
          auth0-m2m-client-id: ${{ secrets.AUTH0_M2M_CLIENT_ID }}
          auth0-m2m-client-secret: ${{ secrets.AUTH0_M2M_CLIENT_SECRET }}
          mailsac-api-key: ${{ secrets.MAILSAC_API_KEY }}
          email-verification-strategy: ${{ vars.EMAIL_VERIFICATION_STRATEGY || 'mailsac-code' }}
          test-user-email: ${{ secrets.CONSOLE_WEB_E2E_TEST_USER_EMAIL }}
          test-user-password: ${{ secrets.CONSOLE_WEB_E2E_TEST_USER_PASSWORD }}

  auto-approve-decision:
    needs: [setup, test-beta]
    runs-on: [self-hosted, akash]
    permissions:
      contents: read
      pull-requests: read
    outputs:
      approve: ${{ steps.check.outputs.in-window }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/associated-pr
        id: pr
        continue-on-error: true
        with:
          ref: console-web/v${{ needs.setup.outputs.image_tag }}
      - uses: ./.github/actions/working-hours-check
        id: check
        with:
          actor: ${{ steps.pr.outputs.author }}
          working-hours-config: ${{ vars.WORKING_HOURS_BY_ACTOR }}

  deploy-prod:
    permissions:
      contents: read
      pull-requests: read
      deployments: write
    needs: [setup, test-beta, auto-approve-decision]
    name: Deploy to prod
    uses: ./.github/workflows/reusable-deploy-k8s.yml
    secrets: inherit
    with:
      app: console-web
      appVersion: ${{ needs.setup.outputs.image_tag }}
      environment: prod
      approve: ${{ needs.auto-approve-decision.outputs.approve == 'true' }}
