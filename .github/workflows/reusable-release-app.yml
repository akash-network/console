name: Release Backend App

on:
  workflow_call:
    inputs:
      app:
        description: "The app to release (directory name in ./apps/*)"
        required: true
        type: string
      sha:
        description: "The commit SHA to release (defaults to GITHUB_SHA)"
        required: false
        type: string
    outputs:
      git_tag:
        description: "The git tag released"
        value: ${{ jobs.release.outputs.git_tag }}
      image_tag:
        description: "The Docker image tag"
        value: ${{ jobs.build.outputs.image_tag }}

permissions:
  contents: read

jobs:
  release:
    name: Create Release
    uses: ./.github/workflows/reusable-create-github-release.yml
    secrets: inherit
    permissions:
      contents: write
    with:
      app: ${{ inputs.app }}
      sha: ${{ inputs.sha }}

  build:
    needs: release
    name: Build Docker image
    if: needs.release.outputs.git_tag != ''
    uses: ./.github/workflows/reusable-build-image.yml
    secrets: inherit
    permissions:
      contents: write
      packages: write
    with:
      tag: ${{ needs.release.outputs.git_tag }}

  deploy:
    needs: [release, build]
    if: needs.release.outputs.git_tag != ''
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger deployment
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_TAG: ${{ needs.release.outputs.git_tag }}
        run: | # shell
          # Derive deploy app name from the tag prefix — apps/deploy-web is published as
          # console-web, apps/api as console-api, so the dir name doesn't match the
          # deploy workflow's app input. The tag is always <package-name>/v<version>.
          gh workflow run reusable-deploy-app.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f app="${GIT_TAG%%/*}" \
            -f image_tag="$GIT_TAG" \
            -f cancel-if-stale=true
