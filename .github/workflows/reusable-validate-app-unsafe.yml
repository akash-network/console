# We need a separate workflow to get access to secrets because github doesn't share secrets on pull_request events.
# https://docs.github.com/en/actions/reference/events-that-trigger-workflows#pull_request_target
#
# !!!! PLEASE be extra careful here and treat forked repository as untrusted user input !!!!

name: "CI: validate app unsafe"

on:
  workflow_call:
    inputs:
      path:
        description: "The path to the workspace to validate"
        required: true
        type: string
      pr_head_ref:
        description: "PR head branch ref (optional, defaults to github.event.pull_request.head.ref)"
        required: false
        type: string
      pr_head_repo:
        description: "PR head repository full name (optional, defaults to github.event.pull_request.head.repo.full_name)"
        required: false
        type: string
      run_static_analyses:
        description: "Run static analyses (Snyk Code)"
        required: false
        type: boolean
        default: false
      run_deps_scan:
        description: "Run dependencies scan (Snyk)"
        required: false
        type: boolean
        default: false
    secrets:
      gh-token:
        description: "github token used to fetch changed files in PR"
        required: true
      snyk-token:
        description: "snyk token used to test code for security issues"
        required: true

jobs:
  static-analyses:
    if: ${{ inputs.run_static_analyses }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UNTRUSTED user's fork
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.pr_head_ref || github.event.pull_request.head.ref }}
          repository: ${{ inputs.pr_head_repo || github.event.pull_request.head.repo.full_name }}
          path: ./untrusted-user-fork
      - name: Copy .dcignore
        shell: bash
        run: cp ./untrusted-user-fork/.dcignore ./untrusted-user-fork/${{ inputs.path }}/.dcignore
      - name: Test code for security issues
        uses: snyk/actions/node@4a528b5c534bb771b6e3772656a8e0e9dc902f8b
        env:
          SNYK_TOKEN: ${{ secrets.snyk-token }}
        with:
          command: code
          args: test ./untrusted-user-fork/${{ inputs.path }} --severity-threshold=medium
  apps-deps-scan:
    if: ${{ inputs.run_deps_scan }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UNTRUSTED user's fork
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.pr_head_ref || github.event.pull_request.head.ref }}
          repository: ${{ inputs.pr_head_repo || github.event.pull_request.head.repo.full_name }}
          path: ./untrusted-user-fork
      - name: Validate dependencies for security issues
        uses: snyk/actions/node@4a528b5c534bb771b6e3772656a8e0e9dc902f8b
        env:
          SNYK_TOKEN: ${{ secrets.snyk-token }}
        with:
          command: test
          args: --file ./untrusted-user-fork/${{ inputs.path }}/package.json
