name: "Local Packages CI"

on:
  merge_group:
  pull_request:
    branches: ["main", "main-sdk-next"]
    paths:
      - "packages/**"
      - ".github/workflows/local-packages-ci.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  should-validate:
    uses: ./.github/workflows/reusable-should-validate.yml
    with:
      path: packages

  validate:
    needs: should-validate
    if: needs.should-validate.outputs.has_changes == 'true'
    name: Validate local packages
    runs-on: [self-hosted, akash]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-app-deps

      - name: Static analysis
        if: github.event_name != 'merge_group'
        run: npm run lint -w ./packages --if-present -- --quiet

      - name: Ensure there are no leftovers
        if: github.event_name == 'pull_request'
        run: |
          workspace_args=()
          for dir in ./packages/*/; do
            workspace_args+=(--workspace "${dir%/}")
          done
          npm run knip -- "${workspace_args[@]}"

      - name: Type checking
        run: npm run validate:types -w ./packages --if-present

      - name: Run local package tests
        run: npm run test -w ./packages --if-present
